<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{error.title}">AsapJe - Error</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}"><span class="brand-mark">AJ</span><span>AsapJe</span></a>
    <nav class="nav">
        <a th:href="@{/restaurants}" th:text="#{nav.restaurants}">Restaurants</a>
        <a th:href="@{/foods}" th:text="#{nav.foods}">Foods</a>
        <a th:href="@{/cart}" th:text="#{nav.cart}">Cart</a>
        <a th:href="@{/orders}" th:text="#{nav.orders}">My orders</a>
    </nav>
    <div class="language-switch">
        <a th:href="@{/(lang='ru')}">RU</a>
        <a th:href="@{/(lang='en')}">EN</a>
    </div>
    <div class="actions" th:if="${currentUsername != null}">
        <span class="account-pill"><span class="account-avatar" th:text="${#strings.substring(currentUsername,0,1)}">U</span><span class="account-name" th:text="${currentUsername}">user</span></span>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-ghost" type="submit" th:text="#{nav.logout}">Log out</button>
        </form>
    </div>
</header>

<main class="section error-section">
    <div class="error-panel">
        <p class="eyebrow"><span th:text="#{error.eyebrow}">Error</span> <span th:text="${errorStatus}">404</span></p>
        <h2 th:text="${errorTitle}">Nothing found</h2>
        <p th:text="${errorMessage}">Requested object not found.</p>
        <div class="error-actions">
            <a class="btn btn-primary" th:href="@{${errorBackUrl}}" th:text="#{error.home}">Home</a>
            <a class="btn btn-ghost" th:href="@{/foods}" th:text="#{error.foods}">To foods</a>
        </div>
    </div>
</main>
</body>
</html>
