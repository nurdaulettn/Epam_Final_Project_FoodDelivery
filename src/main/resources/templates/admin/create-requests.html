<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsapJe - Заявки ресторанов</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body>

<header class="topbar">
    <a class="brand" th:href="@{/}">
        <span class="brand-mark">AJ</span>
        <span>AsapJe</span>
    </a>

    <nav class="nav">
        <a th:href="@{/admin/create-requests}">Заявки</a>
        <a th:href="@{/categories}">Категории</a>
        <a th:href="@{/admin/categories/create}">Создать категорию</a>
        <a th:href="@{/restaurants}">Рестораны</a>
        <a th:href="@{/foods}">Блюда</a>
    </nav>

    <div class="actions">
        <span class="account-pill">
            <span class="account-avatar" th:text="${#strings.substring(currentUsername,0,1)}">U</span>
            <span class="account-name" th:text="${currentUsername}">user</span>
        </span>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <button class="btn btn-ghost" type="submit">Выйти</button>
        </form>
    </div>
</header>

<main class="section">
    <div class="section-head">
        <p class="eyebrow">Панель администратора</p>
        <h2>Заявки на создание ресторанов</h2>
    </div>

    <div class="cards">
        <article class="restaurant"
                 th:each="restaurant : ${restaurants}">
            <div class="restaurant-image green"
                 th:text="${#strings.substring(restaurant.name,0,1)}">
                R
            </div>

            <h3 th:text="${restaurant.name}">Restaurant</h3>
            <p th:text="${restaurant.description}">Description</p>

            <p>
                Адрес:
                <span th:text="${restaurant.address}">Address</span>
            </p>

            <p>
                Телефон:
                <span th:text="${restaurant.phone}">Phone</span>
            </p>

            <p>
                Время:
                <span th:text="${restaurant.openingTime}">09:00</span>
                -
                <span th:text="${restaurant.closingTime}">22:00</span>
            </p>

            <div class="actions" style="margin-top:20px; margin-left:0;">
                <form th:action="@{/admin/create-requests/{id}/confirm(id=${restaurant.id})}"
                      method="post">
                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <button class="btn btn-primary" type="submit">
                        Подтвердить
                    </button>
                </form>

                <form th:action="@{/admin/create-requests/{id}/reject(id=${restaurant.id})}"
                      method="post">
                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <button class="btn btn-ghost" type="submit">
                        Отклонить
                    </button>
                </form>
            </div>
        </article>
    </div>

    <div th:if="${#lists.isEmpty(restaurants)}"
         style="text-align:center;margin-top:50px">
        <h3>Нет заявок на подтверждение</h3>
        <a class="btn btn-primary" th:href="@{/restaurants}">
            Открыть рестораны
        </a>
    </div>
</main>
</body>
</html>
