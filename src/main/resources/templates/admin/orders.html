<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{admin.orders.title}">AsapJe - Orders</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}"><span class="brand-mark">AJ</span><span>AsapJe</span></a>
    <nav class="nav">
        <a th:href="@{/admin/users}" th:text="#{admin.users}">Users</a>
        <a th:href="@{/admin/create-requests}" th:text="#{admin.requests}">Requests</a>
        <a th:href="@{/admin/orders}" th:text="#{manager.orders}">Orders</a>
        <a th:href="@{/categories}" th:text="#{nav.categories}">Categories</a>
        <a th:href="@{/admin/categories/create}" th:text="#{admin.create.category}">Create category</a>
        <a th:href="@{/restaurants}" th:text="#{nav.restaurants}">Restaurants</a>
        <a th:href="@{/foods}" th:text="#{nav.foods}">Foods</a>
    </nav>
    <div class="language-switch">
        <a th:href="@{/admin/orders(lang='ru')}">RU</a>
        <a th:href="@{/admin/orders(lang='en')}">EN</a>
    </div>
    <div class="actions">
        <span class="account-pill"><span class="account-avatar" th:text="${#strings.substring(currentUsername,0,1)}">U</span><span class="account-name" th:text="${currentUsername}">user</span></span>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-ghost" type="submit" th:text="#{nav.logout}">Log out</button>
        </form>
    </div>
</header>

<main class="section">
    <div class="section-head">
        <p class="eyebrow" th:text="#{admin.panel}">Administrator panel</p>
        <h2 th:text="#{admin.orders.heading}">All orders</h2>
        <p th:text="#{admin.orders.subtitle}">Review orders.</p>
    </div>
    <div th:if="${#lists.isEmpty(orders)}" style="text-align:center;margin-top:50px">
        <h3 th:text="#{admin.orders.empty}">No orders</h3>
        <a class="btn btn-primary" th:href="@{/admin/create-requests}" th:text="#{admin.orders.to.requests}">Go to requests</a>
    </div>
    <section th:unless="${#lists.isEmpty(orders)}" class="admin-table-wrap">
        <table class="admin-table">
            <thead>
            <tr>
                <th>ID</th>
                <th th:text="#{admin.table.client}">Client</th>
                <th th:text="#{admin.table.restaurant}">Restaurant</th>
                <th th:text="#{admin.table.status}">Status</th>
                <th th:text="#{admin.table.total}">Total</th>
                <th th:text="#{admin.table.date}">Date</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td>#<span th:text="${order.id}">1</span></td>
                <td th:text="${order.clientName}">Client</td>
                <td th:text="${order.restaurantName}">Restaurant</td>
                <td><span class="order-status" th:text="#{${'status.' + order.status.name()}}">Preparing</span></td>
                <td><span th:text="${order.totalPrice}">0</span> <span th:text="#{common.currency}">₸</span></td>
                <td th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}">28.06.2026 12:00</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
