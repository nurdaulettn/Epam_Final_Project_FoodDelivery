<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{categories.create.title}">AsapJe - Create category</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-card">
        <div class="auth-hero">
            <a class="auth-back" th:href="@{/categories}" th:text="#{categories.create.back}">To categories</a>
            <div class="language-switch auth-language-switch">
                <a th:href="@{/admin/categories/create(lang='ru')}">RU</a>
                <a th:href="@{/admin/categories/create(lang='en')}">EN</a>
            </div>
            <div class="auth-hero-content">
                <div class="auth-food-mark">AJ</div>
                <h1 th:text="#{categories.create.hero.title}">Add category.</h1>
                <p th:text="#{categories.create.hero.text}">Categories help customers.</p>
            </div>
        </div>

        <div class="auth-form-area">
            <a class="auth-logo" th:href="@{/}">
                <span class="brand-mark">AJ</span>
                <span>AsapJe</span>
            </a>

            <div class="auth-heading">
                <h2 th:text="#{categories.create.heading}">Create category</h2>
                <p th:text="#{categories.create.subtitle}">Enter name</p>
            </div>

            <form class="auth-form" th:action="@{/admin/categories/create}" th:object="${category}" method="post">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="form-group">
                    <span class="form-label" th:text="#{form.name}">Name</span>
                    <input class="form-input" type="text" th:field="*{name}" minlength="2" maxlength="100" required>
                    <span class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}" th:text="#{form.error}">Error</span>
                </label>
                <button class="btn btn-primary auth-submit" type="submit" th:text="#{categories.create.submit}">Create category</button>
            </form>

            <p class="auth-switch">
                <a th:href="@{/categories}" th:text="#{categories.back.list}">Back to list</a>
            </p>
        </div>
    </section>
</main>
</body>
</html>
