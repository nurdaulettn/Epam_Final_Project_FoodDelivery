<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsapJe - Мои заказы</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">
        <span class="brand-mark">AJ</span>
        <span>AsapJe</span>
    </a>

    <nav class="nav">
        <a th:href="@{/restaurants}">Рестораны</a>
        <a th:href="@{/categories}">Категории</a>
        <a th:href="@{/foods}">Блюда</a>
        <a th:href="@{/cart}">Корзина</a>
        <a th:href="@{/orders}">Мои заказы</a>
    </nav>

    <div class="actions" th:if="${currentUsername != null}">
        <span class="account-pill">
            <span class="account-avatar" th:text="${#strings.substring(currentUsername,0,1)}">U</span>
            <span class="account-name" th:text="${currentUsername}">user</span>
        </span>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <button class="btn btn-ghost" type="submit">Выйти</button>
        </form>
    </div>
</header>

<main class="section">
    <div class="section-head">
        <p class="eyebrow">История</p>
        <h2>Мои заказы</h2>
    </div>

    <div th:if="${#lists.isEmpty(orders)}"
         style="margin-top:40px; text-align:center;">
        <h3>У вас пока нет заказов</h3>
        <a class="btn btn-primary" th:href="@{/foods}">
            Перейти к блюдам
        </a>
    </div>

    <section th:unless="${#lists.isEmpty(orders)}" class="order-list">
        <article class="order-row" th:each="order : ${orders}">
            <div>
                <p class="eyebrow">
                    Заказ #
                    <span th:text="${order.id}">1</span>
                </p>
                <h3 th:text="${order.restaurantName}">Restaurant</h3>
                <p>
                    <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}">25.06.2026 18:30</span>
                    ·
                    <span th:text="${order.deliveryType.displayName}">Доставка</span>
                </p>
            </div>

            <div class="order-status">
                <span th:text="${order.status.displayName}">Ожидает оплаты</span>
            </div>

            <strong>
                <span th:text="${order.totalPrice}">0</span>
                ₸
            </strong>

            <a class="btn btn-primary"
               th:href="@{/orders/{orderId}(orderId=${order.id})}">
                Подробнее
            </a>
        </article>
    </section>
</main>
</body>
</html>
