<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{orders.title}">AsapJe - Order</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">
        <span class="brand-mark">AJ</span>
        <span>AsapJe</span>
    </a>

    <nav class="nav">
        <a th:href="@{/restaurants}" th:text="#{nav.restaurants}">Restaurants</a>
        <a th:href="@{/categories}" th:text="#{nav.categories}">Categories</a>
        <a th:href="@{/foods}" th:text="#{nav.foods}">Foods</a>
        <a th:href="@{/cart}" th:text="#{nav.cart}">Cart</a>
        <a th:href="@{/orders}" th:text="#{nav.orders}">My orders</a>
    </nav>

    <div class="language-switch">
        <a th:href="@{/orders/{orderId}(orderId=${order.id}, lang='ru')}">RU</a>
        <a th:href="@{/orders/{orderId}(orderId=${order.id}, lang='en')}">EN</a>
    </div>

    <div class="actions" th:if="${currentUsername != null}">
        <span class="account-pill">
            <span class="account-avatar" th:text="${#strings.substring(currentUsername,0,1)}">U</span>
            <span class="account-name" th:text="${currentUsername}">user</span>
        </span>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <button class="btn btn-ghost" type="submit" th:text="#{nav.logout}">Log out</button>
        </form>
    </div>
</header>

<main class="section">
    <div class="section-head">
        <p class="eyebrow" th:text="#{orders.order}">Order</p>
        <h2>
            <span th:text="#{orders.order}">Order</span>
            #
            <span th:text="${order.id}">1</span>
        </h2>
    </div>

    <div class="auth-alert auth-alert-success"
         th:if="${orderSuccess != null}"
         th:text="${orderSuccess}">
        Order updated
    </div>

    <div class="auth-alert auth-alert-error"
         th:if="${orderError != null}"
         th:text="${orderError}">
        Order error
    </div>

    <div class="checkout-layout">
        <section class="cart-items">
            <article class="cart-item" th:each="item : ${orderItems}">
                <div>
                    <h3 th:text="${item.foodName}">Food name</h3>
                    <p>
                        <span th:text="${item.price}">0</span>
                        <span th:text="#{common.price.each}">₸ per item</span>
                    </p>
                </div>

                <strong>
                    <span th:text="${item.quantity}">1</span>
                    <span th:text="#{common.quantity.short}">pcs.</span>
                </strong>

                <strong>
                    <span th:text="${item.subtotal}">0</span>
                    <span th:text="#{common.currency}">₸</span>
                </strong>
            </article>
        </section>

        <aside class="cart-summary">
            <p class="eyebrow" th:text="#{common.status}">Status</p>
            <h2 class="status-title" th:text="#{${'status.' + order.status.name()}}">
                Pending payment
            </h2>

            <form class="js-disable-on-submit"
                  th:if="${order.status == T(kz.nurdaulet.entity.enums.OrderStatus).PENDING_PAYMENT}"
                  th:action="@{/orders/{orderId}/pay(orderId=${order.id})}"
                  method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button class="btn btn-primary" type="submit" th:attr="data-submitting-text=#{common.processing}" th:text="#{orders.pay}">
                    Pay
                </button>
            </form>

            <div class="checkout-summary-item">
                <span th:text="#{common.delivery.type}">Receiving type</span>
                <strong th:text="#{${'delivery.' + order.deliveryType.name()}}">Delivery</strong>
            </div>

            <div class="checkout-summary-item" th:if="${order.deliveryAddress != null}">
                <span th:text="#{common.address}">Address</span>
                <strong th:text="${order.deliveryAddress}">Address</strong>
            </div>

            <div class="checkout-summary-item">
                <span th:text="#{common.total}">Total</span>
                <strong>
                    <span th:text="${order.totalPrice}">0</span>
                    <span th:text="#{common.currency}">₸</span>
                </strong>
            </div>

            <a class="btn btn-ghost" th:href="@{/foods}" th:text="#{orders.back.foods}">
                Back to foods
            </a>

            <a class="btn btn-ghost" th:href="@{/orders}" th:text="#{nav.orders}">
                My orders
            </a>
        </aside>
    </div>
</main>
<script>
    document.querySelectorAll('.js-disable-on-submit').forEach((form) => {
        form.addEventListener('submit', () => {
            form.querySelectorAll('button[type="submit"]').forEach((button) => {
                const submittingText = button.dataset.submittingText;
                if (submittingText) {
                    button.textContent = submittingText;
                }
                button.disabled = true;
            });
        });
    });
</script>
</body>
</html>
