<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{foods.title}">AsapJe - Foods</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">
        <span class="brand-mark">AJ</span>
        <span>AsapJe</span>
    </a>

    <nav class="nav">
        <a th:href="@{/restaurants}" th:text="#{nav.restaurants}">Restaurants</a>
        <a th:href="@{/categories}" th:text="#{nav.categories}">Categories</a>
        <a th:href="@{/foods}" th:text="#{nav.foods}">Foods</a>
        <a th:href="@{/cart}" th:text="#{nav.cart}">Cart</a>
        <a th:href="@{/orders}" th:text="#{nav.orders}">My orders</a>
    </nav>

    <div class="language-switch">
        <a th:href="@{/foods(lang='ru', search=${search}, category=${selectedCategoryId}, restaurant=${selectedRestaurantId}, page=${page.currentPage})}">RU</a>
        <a th:href="@{/foods(lang='en', search=${search}, category=${selectedCategoryId}, restaurant=${selectedRestaurantId}, page=${page.currentPage})}">EN</a>
    </div>

    <div class="actions" th:if="${currentUsername != null}">
        <span class="account-pill">
            <span class="account-avatar" th:text="${#strings.substring(currentUsername,0,1)}">U</span>
            <span class="account-name" th:text="${currentUsername}">user</span>
        </span>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <button class="btn btn-ghost" type="submit" th:text="#{nav.logout}">Log out</button>
        </form>
    </div>
</header>

<main class="section">
    <div class="section-head">
        <p class="eyebrow" th:text="#{foods.eyebrow}">Menu</p>
        <h2 th:text="#{foods.heading}">Foods</h2>
    </div>

    <div class="auth-alert auth-alert-success"
         th:if="${cartSuccess != null}"
         th:text="${cartSuccess}">
        Food added to cart
    </div>

    <div class="auth-alert auth-alert-error"
         th:if="${cartError != null}"
         th:text="${cartError}">
        Cart error
    </div>

    <form th:action="@{/foods}"
          method="get"
          style="display:grid; grid-template-columns: 1.5fr 1fr 1fr auto auto; gap:12px; margin-bottom:28px; align-items:center;">

        <input class="form-input"
               type="text"
               name="search"
               th:value="${search}"
               th:placeholder="#{foods.search.placeholder}">

        <select class="form-input" name="category">
            <option value="" th:text="#{foods.all.categories}">All categories</option>
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}"
                    th:selected="${selectedCategoryId != null && selectedCategoryId == category.id}">
                Category
            </option>
        </select>

        <select class="form-input" name="restaurant">
            <option value="" th:text="#{foods.all.restaurants}">All restaurants</option>
            <option th:each="restaurant : ${restaurants}"
                    th:value="${restaurant.id}"
                    th:text="${restaurant.name}"
                    th:selected="${selectedRestaurantId != null && selectedRestaurantId == restaurant.id}">
                Restaurant
            </option>
        </select>

        <button class="btn btn-primary" type="submit" th:text="#{common.search}">Search</button>

        <a class="btn btn-ghost" th:href="@{/foods}" th:text="#{common.reset}">Reset</a>
    </form>

    <div class="cards">
        <article class="restaurant" th:each="food : ${foods}">
            <div class="restaurant-image green"
                 th:text="${#strings.substring(food.name,0,1)}">
                F
            </div>

            <h3 th:text="${food.name}">Food name</h3>

            <p th:text="${food.description}">
                Description
            </p>

            <span>
                <span th:text="${food.price}">0</span>
                <span th:text="#{common.currency}">₸</span>
            </span>

            <br><br>

            <small>
                <span th:text="#{foods.restaurant}">Restaurant</span>:
                <span th:each="restaurant : ${restaurants}"
                      th:if="${restaurant.id == food.restaurantId}"
                      th:text="${restaurant.name}">Restaurant</span>
            </small>

            <br>

            <small>
                <span th:text="#{foods.category}">Category</span>:
                <span th:each="category : ${categories}"
                      th:if="${category.id == food.categoryId}"
                      th:text="${category.name}">Category</span>
            </small>

            <br><br>

            <span th:if="${food.available}" th:text="#{foods.available}">
                Available
            </span>

            <span th:unless="${food.available}" th:text="#{foods.unavailable}">
                Unavailable
            </span>

            <form th:if="${food.available}"
                  th:action="@{/cart/add/{foodId}(foodId=${food.id})}"
                  method="post"
                  style="margin-top:18px;">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button class="btn btn-primary" type="submit" th:text="#{foods.add}">
                    Add to cart
                </button>
            </form>
        </article>
    </div>

    <nav class="pagination" th:if="${page.totalPages > 1}">
        <a class="page-link"
           th:classappend="${!page.hasPrevious} ? ' disabled'"
           th:href="@{/foods(page=${page.currentPage - 1}, search=${search}, category=${selectedCategoryId}, restaurant=${selectedRestaurantId})}"
           th:text="#{common.back}">
            Back
        </a>

        <a class="page-link"
           th:each="pageNumber : ${#numbers.sequence(1, page.totalPages)}"
           th:classappend="${pageNumber == page.currentPage} ? ' active'"
           th:text="${pageNumber}"
           th:href="@{/foods(page=${pageNumber}, search=${search}, category=${selectedCategoryId}, restaurant=${selectedRestaurantId})}">
            1
        </a>

        <a class="page-link"
           th:classappend="${!page.hasNext} ? ' disabled'"
           th:href="@{/foods(page=${page.currentPage + 1}, search=${search}, category=${selectedCategoryId}, restaurant=${selectedRestaurantId})}"
           th:text="#{common.next}">
            Next
        </a>
    </nav>

    <div th:if="${#lists.isEmpty(foods)}"
         style="margin-top:40px; text-align:center;">
        <h3 th:text="#{foods.empty}">No foods found</h3>
        <a class="btn btn-primary" th:href="@{/foods}" th:text="#{foods.show.all}">
            Show all foods
        </a>
    </div>
</main>
</body>
</html>
