<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{food.edit.title}">AsapJe - Edit food</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-card auth-card-register">
        <div class="auth-hero">
            <a class="auth-back" th:href="@{/restaurants/manager/my-restaurants/{id}(id=${restaurantId})}" th:text="#{food.create.back}">To menu</a>
            <div class="language-switch auth-language-switch">
                <a th:href="@{/restaurants/manager/{restaurantId}/foods/{foodId}/update(restaurantId=${restaurantId}, foodId=${foodId}, lang='ru')}">RU</a>
                <a th:href="@{/restaurants/manager/{restaurantId}/foods/{foodId}/update(restaurantId=${restaurantId}, foodId=${foodId}, lang='en')}">EN</a>
            </div>
            <div class="auth-hero-content">
                <div class="auth-food-mark">AJ</div>
                <h1 th:text="#{food.edit.hero.title}">Update food.</h1>
                <p th:text="#{food.edit.hero.text}">Change food details.</p>
            </div>
        </div>

        <div class="auth-form-area">
            <a class="auth-logo" th:href="@{/}">
                <span class="brand-mark">AJ</span>
                <span>AsapJe</span>
            </a>
            <div class="auth-heading">
                <h2 th:text="#{food.edit.heading}">Edit food</h2>
                <p th:text="#{food.edit.subtitle}">Changes will be visible after saving</p>
            </div>

            <form class="auth-form"
                  th:action="@{/restaurants/manager/{restaurantId}/foods/{foodId}/update(restaurantId=${restaurantId}, foodId=${foodId})}"
                  th:object="${food}" method="post">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="form-group">
                    <span class="form-label" th:text="#{form.name}">Name</span>
                    <input class="form-input" type="text" th:field="*{name}" minlength="3" maxlength="100" required>
                    <span class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}" th:text="#{form.error}">Error</span>
                </label>
                <label class="form-group">
                    <span class="form-label" th:text="#{form.description}">Description</span>
                    <textarea class="form-input" th:field="*{description}" maxlength="500" rows="3"></textarea>
                    <span class="form-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}" th:text="#{form.error}">Error</span>
                </label>
                <label class="form-group">
                    <span class="form-label" th:text="#{form.price}">Price</span>
                    <input class="form-input" type="number" th:field="*{price}" min="1" step="1" required>
                    <span class="form-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}" th:text="#{form.error}">Error</span>
                </label>
                <label class="form-group">
                    <span class="form-label" th:text="#{form.category}">Category</span>
                    <select class="form-input" th:field="*{categoryId}" required>
                        <option value="" th:text="#{form.select.category}">Choose category</option>
                        <option th:each="category : ${category}" th:value="${category.id}" th:text="${category.name}">Category</option>
                    </select>
                    <span class="form-error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}" th:text="#{form.error}">Error</span>
                </label>
                <button class="btn btn-primary auth-submit" type="submit" th:text="#{food.edit.submit}">Save changes</button>
            </form>

            <p class="auth-switch">
                <a th:href="@{/restaurants/manager/my-restaurants/{id}(id=${restaurantId})}" th:text="#{food.back.menu}">Back to menu</a>
            </p>
        </div>
    </section>
</main>
</body>
</html>
