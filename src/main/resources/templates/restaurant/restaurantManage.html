<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{manager.menu.manage}">Menu management</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}"><span class="brand-mark">AJ</span><span>AsapJe</span></a>
    <nav class="nav">
        <a th:href="@{/restaurants/manager/my-restaurants}" th:text="#{restaurants.my}">My restaurants</a>
        <a th:href="@{/foods}" th:text="#{manager.all.foods}">All foods</a>
    </nav>
    <div class="language-switch">
        <a th:href="@{/restaurants/manager/my-restaurants/{id}(id=${restaurantId}, lang='ru')}">RU</a>
        <a th:href="@{/restaurants/manager/my-restaurants/{id}(id=${restaurantId}, lang='en')}">EN</a>
    </div>
    <div class="actions" th:if="${currentUsername != null}">
        <span class="account-pill"><span class="account-avatar" th:text="${#strings.substring(currentUsername,0,1)}">U</span><span class="account-name" th:text="${currentUsername}">user</span></span>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-ghost" type="submit" th:text="#{nav.logout}">Log out</button>
        </form>
    </div>
</header>

<main class="section">
    <div class="section-head">
        <p class="eyebrow" th:text="#{manager.panel}">Manager panel</p>
        <h2 th:text="#{manager.menu.manage}">Menu management</h2>
    </div>

    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px;">
        <a class="btn btn-primary" th:href="@{/restaurants/manager/{id}/foods/create(id=${restaurantId})}">+ <span th:text="#{manager.add.food}">Add food</span></a>
        <a class="btn btn-primary" th:href="@{/restaurants/manager/{id}/orders(id=${restaurantId})}" th:text="#{manager.orders}">Orders</a>
        <a class="btn btn-ghost" th:href="@{/restaurants/manager/my-restaurants}" th:text="#{manager.back.restaurants}">Back</a>
    </div>

    <div class="cards">
        <article class="restaurant" th:each="food : ${foods}">
            <div class="restaurant-image green" th:text="${#strings.substring(food.name,0,1)}">F</div>
            <h3 th:text="${food.name}">Food name</h3>
            <p th:text="${food.description}">Description</p>
            <span><span th:text="${food.price}">0</span> <span th:text="#{common.currency}">₸</span></span>
            <br><br>
            <small>
                <span th:text="#{common.status}">Status</span>:
                <span th:if="${food.available}" th:text="#{manager.available}">available</span>
                <span th:unless="${food.available}" th:text="#{manager.unavailable}">unavailable</span>
            </small>

            <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:18px;">
                <a class="btn btn-primary" th:href="@{/restaurants/manager/{restaurantId}/foods/{foodId}/update(restaurantId=${restaurantId}, foodId=${food.id})}" th:text="#{manager.edit}">Edit</a>
                <form th:if="${food.available}" th:action="@{/restaurants/manager/{restaurantId}/foods/{foodId}/disable(restaurantId=${restaurantId}, foodId=${food.id})}" method="post" style="margin:0;">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-ghost" type="submit" th:text="#{manager.disable}">Disable</button>
                </form>
                <form th:unless="${food.available}" th:action="@{/restaurants/manager/{restaurantId}/foods/{foodId}/enable(restaurantId=${restaurantId}, foodId=${food.id})}" method="post" style="margin:0;">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-ghost" type="submit" th:text="#{manager.enable}">Enable</button>
                </form>
                <form th:unless="${food.available}" th:action="@{/restaurants/manager/{restaurantId}/foods/{foodId}/delete(restaurantId=${restaurantId}, foodId=${food.id})}" method="post" style="margin:0;">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-ghost" type="submit" th:text="#{manager.delete}">Delete</button>
                </form>
            </div>
        </article>
    </div>

    <div th:if="${#lists.isEmpty(foods)}" style="margin-top:40px; text-align:center;">
        <h3 th:text="#{manager.menu.empty}">No foods</h3>
        <a class="btn btn-primary" th:href="@{/restaurants/manager/{id}/foods/create(id=${restaurantId})}" th:text="#{manager.create.first.food}">Create first food</a>
    </div>
</main>
</body>
</html>
