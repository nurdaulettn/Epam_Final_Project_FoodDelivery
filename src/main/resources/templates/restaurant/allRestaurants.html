<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsapJe - Рестораны</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body>

<header class="topbar">
    <a class="brand" th:href="@{/}">
        <span class="brand-mark">AJ</span>
        <span>AsapJe</span>
    </a>

    <nav class="nav">
        <a th:href="@{/restaurants}">Рестораны</a>
        <a th:href="@{/foods}">Блюда</a>
        <a th:href="@{/cart}">Корзина</a>
        <a th:href="@{/orders}">Мои заказы</a>
    </nav>

    <div class="actions" th:if="${currentUsername == null}">
        <a class="btn btn-ghost" th:href="@{/login}">Войти</a>
        <a class="btn btn-primary" th:href="@{/register}">Регистрация</a>
    </div>
    <div class="actions" th:if="${currentUsername != null}">
        <a class="btn btn-primary"
           th:if="${currentUserManager}"
           th:href="@{/restaurants/manager/my-restaurants}">
            Мои рестораны
        </a>
        <span class="account-pill">
            <span class="account-avatar" th:text="${#strings.substring(currentUsername,0,1)}">U</span>
            <span class="account-name" th:text="${currentUsername}">user</span>
        </span>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <button class="btn btn-ghost" type="submit">Выйти</button>
        </form>
    </div>
</header>

<main class="section">

    <div class="section-head">
        <p class="eyebrow">Каталог</p>
        <h2>Рестораны</h2>
    </div>

    <form th:action="@{/restaurants}"
          method="get"
          style="display:flex; gap:12px; margin-bottom:28px; max-width:620px;">
        <input class="form-input"
               type="text"
               name="search"
               th:value="${search}"
               placeholder="Поиск по названию ресторана"
               style="min-height:44px; flex:1;">

        <button class="btn btn-primary" type="submit">
            Найти
        </button>

        <a class="btn btn-ghost" th:href="@{/restaurants}">
            Сбросить
        </a>
    </form>

    <div class="cards">
        <article class="restaurant"
                 th:each="restaurant : ${restaurants}">

            <div class="restaurant-image green"
                 th:text="${#strings.substring(restaurant.name,0,1)}">
                R
            </div>

            <h3 th:text="${restaurant.name}">
                Restaurant Name
            </h3>

            <p th:text="${restaurant.description}">
                Description
            </p>

            <span>
                Рейтинг:
                <span th:text="${restaurant.ratingAvg}">0.0</span>
                (<span th:text="${restaurant.ratingCount}">0</span> отзывов)
            </span>

            <br><br>

            <small>
                Адрес:
                <span th:text="${restaurant.address}">Address</span>
            </small>

            <br>

            <small>
                Телефон:
                <span th:text="${restaurant.phone}">Phone</span>
            </small>

            <br>

            <small>
                Время работы:
                <span th:text="${restaurant.openingTime}">09:00</span>
                -
                <span th:text="${restaurant.closingTime}">22:00</span>
            </small>

            <div style="margin-top:18px;">
                <a class="btn btn-primary"
                   th:href="@{/foods(restaurant=${restaurant.id})}">
                    Посмотреть блюда
                </a>
            </div>

        </article>
    </div>

    <div th:if="${#lists.isEmpty(restaurants)}"
         style="margin-top:40px; text-align:center;">
        <h3>Рестораны не найдены</h3>
        <a class="btn btn-primary" th:href="@{/restaurants}">
            Показать все рестораны
        </a>
    </div>

</main>

</body>
</html>
