<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{checkout.title}">AsapJe - Checkout</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">
        <span class="brand-mark">AJ</span>
        <span>AsapJe</span>
    </a>

    <nav class="nav">
        <a th:href="@{/restaurants}" th:text="#{nav.restaurants}">Restaurants</a>
        <a th:href="@{/categories}" th:text="#{nav.categories}">Categories</a>
        <a th:href="@{/foods}" th:text="#{nav.foods}">Foods</a>
        <a th:href="@{/cart}" th:text="#{nav.cart}">Cart</a>
        <a th:href="@{/orders}" th:text="#{nav.orders}">My orders</a>
    </nav>

    <div class="language-switch">
        <a th:href="@{/cart/checkout(lang='ru')}">RU</a>
        <a th:href="@{/cart/checkout(lang='en')}">EN</a>
    </div>

    <div class="actions" th:if="${currentUsername != null}">
        <span class="account-pill">
            <span class="account-avatar" th:text="${#strings.substring(currentUsername,0,1)}">U</span>
            <span class="account-name" th:text="${currentUsername}">user</span>
        </span>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <button class="btn btn-ghost" type="submit" th:text="#{nav.logout}">Log out</button>
        </form>
    </div>
</header>

<main class="section">
    <div class="section-head">
        <p class="eyebrow" th:text="#{checkout.eyebrow}">Checkout</p>
        <h2 th:text="#{checkout.heading}">Review your order</h2>
    </div>

    <div class="checkout-layout">
        <section>
            <form class="checkout-form"
                  th:action="@{/cart/checkout}"
                  th:object="${checkout}"
                  method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="auth-alert auth-alert-error"
                     th:if="${#fields.hasGlobalErrors()}"
                     th:each="error : ${#fields.globalErrors()}"
                     th:text="${error}">
                    Checkout error
                </div>

                <div class="form-group">
                    <label class="form-label" th:text="#{common.delivery.type}">Receiving type</label>
                    <div class="checkout-options">
                        <label class="checkout-option">
                            <input type="radio"
                                   th:field="*{deliveryType}"
                                   value="DELIVERY">
                            <span th:text="#{checkout.delivery}">Delivery</span>
                        </label>

                        <label class="checkout-option">
                            <input type="radio"
                                   th:field="*{deliveryType}"
                                   value="PICKUP">
                            <span th:text="#{checkout.pickup}">Pickup</span>
                        </label>
                    </div>
                    <span class="form-error"
                          th:if="${#fields.hasErrors('deliveryType')}"
                          th:errors="*{deliveryType}">
                        Choose receiving type
                    </span>
                </div>

                <div class="form-group" id="deliveryAddressGroup">
                    <label class="form-label"
                           for="deliveryAddress"
                           th:text="#{checkout.delivery.address}">
                        Delivery address
                    </label>
                    <textarea class="form-input checkout-address"
                              id="deliveryAddress"
                              th:field="*{deliveryAddress}"
                              th:placeholder="#{checkout.address.placeholder}"></textarea>
                    <span class="form-error"
                          th:if="${#fields.hasErrors('deliveryAddress')}"
                          th:errors="*{deliveryAddress}">
                        Delivery address is required
                    </span>
                </div>

                <button class="btn btn-primary" type="submit" th:text="#{checkout.create}">
                    Create order
                </button>
            </form>
        </section>

        <aside class="cart-summary">
            <p class="eyebrow" th:text="#{checkout.your.order}">Your order</p>
            <div class="checkout-summary-item"
                 th:each="item : ${cartItems}">
                <span th:text="${item.foodName}">Food</span>
                <strong>
                    <span th:text="${item.quantity}">1</span>
                    x
                    <span th:text="${item.price}">0</span>
                    <span th:text="#{common.currency}">₸</span>
                </strong>
            </div>

            <h2>
                <span th:text="${total}">0</span>
                <span th:text="#{common.currency}">₸</span>
            </h2>

            <a class="btn btn-ghost" th:href="@{/cart}" th:text="#{checkout.back.cart}">
                Back to cart
            </a>
        </aside>
    </div>
</main>

<script>
    const deliveryInput = document.querySelector('input[name="deliveryType"][value="DELIVERY"]');
    const pickupInput = document.querySelector('input[name="deliveryType"][value="PICKUP"]');
    const addressGroup = document.getElementById('deliveryAddressGroup');
    const addressInput = document.getElementById('deliveryAddress');

    function updateAddressVisibility() {
        const deliverySelected = deliveryInput && deliveryInput.checked;
        addressGroup.style.display = deliverySelected ? 'grid' : 'none';
        addressInput.disabled = !deliverySelected;

        if (!deliverySelected) {
            addressInput.value = '';
        }
    }

    deliveryInput.addEventListener('change', updateAddressVisibility);
    pickupInput.addEventListener('change', updateAddressVisibility);
    updateAddressVisibility();
</script>
</body>
</html>
