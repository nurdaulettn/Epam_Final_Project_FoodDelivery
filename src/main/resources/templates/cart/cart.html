<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{cart.title}">AsapJe - Cart</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">
        <span class="brand-mark">AJ</span>
        <span>AsapJe</span>
    </a>

    <nav class="nav">
        <a th:href="@{/restaurants}" th:text="#{nav.restaurants}">Restaurants</a>
        <a th:href="@{/categories}" th:text="#{nav.categories}">Categories</a>
        <a th:href="@{/foods}" th:text="#{nav.foods}">Foods</a>
        <a th:href="@{/cart}" th:text="#{nav.cart}">Cart</a>
        <a th:href="@{/orders}" th:text="#{nav.orders}">My orders</a>
    </nav>

    <div class="language-switch">
        <a th:href="@{/cart(lang='ru')}">RU</a>
        <a th:href="@{/cart(lang='en')}">EN</a>
    </div>

    <div class="actions" th:if="${currentUsername != null}">
        <span class="account-pill">
            <span class="account-avatar" th:text="${#strings.substring(currentUsername,0,1)}">U</span>
            <span class="account-name" th:text="${currentUsername}">user</span>
        </span>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <button class="btn btn-ghost" type="submit" th:text="#{nav.logout}">Log out</button>
        </form>
    </div>
</header>

<main class="section">
    <div class="section-head">
        <p class="eyebrow" th:text="#{cart.eyebrow}">Order</p>
        <h2 th:text="#{cart.heading}">Cart</h2>
    </div>

    <div class="auth-alert auth-alert-success"
         th:if="${cartSuccess != null}"
         th:text="${cartSuccess}">
        Cart updated
    </div>

    <div class="auth-alert auth-alert-error"
         th:if="${cartError != null}"
         th:text="${cartError}">
        Cart error
    </div>

    <div th:if="${#lists.isEmpty(cartItems)}"
         style="margin-top:40px; text-align:center;">
        <h3 th:text="#{cart.empty}">Cart is empty</h3>
        <a class="btn btn-primary" th:href="@{/foods}" th:text="#{cart.go.foods}">
            Go to foods
        </a>
    </div>

    <div th:unless="${#lists.isEmpty(cartItems)}" class="cart-layout">
        <section class="cart-items">
            <article class="cart-item" th:each="item : ${cartItems}">
                <div>
                    <h3 th:text="${item.foodName}">Food name</h3>
                    <p>
                        <span th:text="${item.price}">0</span>
                        <span th:text="#{common.price.each}">₸ per item</span>
                    </p>
                </div>

                <form class="cart-quantity-form"
                      th:action="@{/cart/update/{foodId}(foodId=${item.foodId})}"
                      method="post">
                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <input class="form-input cart-quantity-input"
                           type="number"
                           name="quantity"
                           min="1"
                           th:value="${item.quantity}">
                    <button class="btn btn-ghost" type="submit" th:text="#{cart.update}">Update</button>
                </form>

                <strong>
                    <span th:text="${item.subtotal}">0</span>
                    <span th:text="#{common.currency}">₸</span>
                </strong>

                <form th:action="@{/cart/remove/{foodId}(foodId=${item.foodId})}"
                      method="post">
                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <button class="btn btn-ghost" type="submit" th:text="#{cart.remove}">Remove</button>
                </form>
            </article>
        </section>

        <aside class="cart-summary">
            <p class="eyebrow" th:text="#{common.total}">Total</p>
            <h2>
                <span th:text="${total}">0</span>
                <span th:text="#{common.currency}">₸</span>
            </h2>

            <a class="btn btn-primary" th:href="@{/cart/checkout}" th:text="#{cart.checkout}">
                Proceed to checkout
            </a>

            <form th:action="@{/cart/clear}" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button class="btn btn-ghost" type="submit" th:text="#{cart.clear}">Clear cart</button>
            </form>
        </aside>
    </div>
</main>
</body>
</html>
