<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.title}">AsapJe - login</title>
    <link rel="stylesheet" th:href="@{/static/css/index.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-card">
        <div class="auth-hero">
            <a class="auth-back" th:href="@{/}" th:text="#{login.back.home}">Home</a>
            <div class="language-switch auth-language-switch">
                <a th:href="@{/login(lang='ru')}">RU</a>
                <a th:href="@{/login(lang='en')}">EN</a>
            </div>
            <div class="auth-hero-content">
                <div class="auth-food-mark">AJ</div>
                <h1 th:text="#{login.hero.title}">Food nearby. Fast. Convenient.</h1>
                <p th:text="#{login.hero.text}">
                    Log in to place orders, manage restaurants, or moderate the platform.
                </p>
            </div>
        </div>

        <div class="auth-form-area">
            <a class="auth-logo" th:href="@{/}">
                <span class="brand-mark">AJ</span>
                <span>AsapJe</span>
            </a>

            <div class="auth-heading">
                <h2 th:text="#{login.welcome}">Welcome back</h2>
                <p th:text="#{login.subtitle}">Enter username and password</p>
            </div>

            <div class="auth-alert auth-alert-error" th:if="${param.error}" th:text="#{login.error}">
                Incorrect username or password.
            </div>
            <div class="auth-alert auth-alert-success" th:if="${param.logout}" th:text="#{login.logout.success}">
                You have logged out.
            </div>
            <div class="auth-alert auth-alert-success" th:if="${param.registered}" th:text="#{login.registered}">
                Account created. You can log in now.
            </div>

            <form class="auth-form" th:action="@{/login}" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <label class="form-group">
                    <span class="form-label" th:text="#{login.username}">Username</span>
                    <input class="form-input"
                           type="text"
                           name="username"
                           placeholder="user"
                           autocomplete="username"
                           required>
                </label>

                <label class="form-group">
                    <span class="form-label" th:text="#{login.password}">Password</span>
                    <input class="form-input"
                           type="password"
                           name="password"
                           th:placeholder="#{login.password}"
                           autocomplete="current-password"
                           required>
                </label>

                <button class="btn btn-primary auth-submit" type="submit" th:text="#{login.submit}">Log in</button>
            </form>

            <p class="auth-switch">
                <span th:text="#{login.no.account}">No account?</span>
                <a th:href="@{/register}" th:text="#{login.register.link}">Register</a>
            </p>
            <p class="auth-switch">
                <a th:href="@{/foods}" th:text="#{login.view.foods}">View foods</a>
            </p>
        </div>
    </section>
</main>
</body>
</html>
